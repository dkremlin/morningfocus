<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MorningFocus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --muted: #8892b0;
    --accent: #6366f1;
    --accent-dim: #3730a3;
    --high: #ef4444;
    --high-dim: #450a0a;
    --med: #f59e0b;
    --med-dim: #451a03;
    --low: #22c55e;
    --low-dim: #052e16;
    --done: #475569;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .header-actions { display: flex; gap: 8px; }

  /* View tabs */
  .view-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px;
  }
  .view-tab {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .view-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .view-tab:hover:not(.active) { color: var(--text); }

  main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

  /* Briefing bar */
  .brief-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .brief-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .brief-chip.overdue { border-color: var(--high); color: var(--high); }
  .brief-chip.today   { border-color: var(--med); color: var(--med); }
  .brief-chip.general { border-color: var(--accent); color: var(--accent); }

  /* Add task form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
  }

  .add-form h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .parse-preview {
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    margin-bottom: 8px;
    transition: color 0.2s;
  }
  .parse-preview.ready { color: var(--low); }
  .parse-preview.error { color: var(--high); }

  .input-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  input[type="text"], input[type="date"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="text"].main-input { flex: 1; min-width: 200px; }
  select.priority-sel { width: 110px; }
  input[type="date"].due-input { width: 150px; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Buttons */
  button {
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #818cf8; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--high); border: 1px solid transparent; padding: 4px 8px; font-size: 12px; }
  .btn-danger:hover { border-color: var(--high); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-bar label { color: var(--muted); font-size: 13px; }
  .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
  }
  .tab-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

  /* Priority filter chips */
  .prio-chip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .prio-chip.active-all  { background: var(--surface2); border-color: var(--accent); color: var(--text); }
  .prio-chip.active-High   { background: var(--high-dim); border-color: var(--high); color: var(--high); }
  .prio-chip.active-Medium { background: var(--med-dim);  border-color: var(--med);  color: var(--med); }
  .prio-chip.active-Low    { background: var(--low-dim);  border-color: var(--low);  color: var(--low); }

  /* Task table */
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .task-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .task-row:hover td { background: var(--surface2); }
  .task-row.is-done td { opacity: 0.45; }
  .task-row.is-done .task-desc { text-decoration: line-through; }

  .prio-badge {
    display: inline-block;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
  }
  .prio-High   { background: var(--high-dim); color: var(--high); }
  .prio-Medium { background: var(--med-dim);  color: var(--med); }
  .prio-Low    { background: var(--low-dim);  color: var(--low); }

  .due-badge { font-size: 12px; color: var(--muted); }
  .due-overdue { color: var(--high); font-weight: 600; }
  .due-today   { color: var(--med); font-weight: 600; }

  /* Inline due date edit */
  .due-cell { cursor: pointer; }
  .due-cell:hover .due-badge { text-decoration: underline; text-decoration-style: dashed; }
  .due-edit-input {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    padding: 3px 6px;
    width: 130px;
    outline: none;
  }

  .check-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    padding: 0;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .check-btn:hover { border-color: var(--low); }
  .check-btn.checked { background: var(--low); border-color: var(--low); }
  .check-btn.checked::after { content: "✓"; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; height: 100%; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-state p { font-size: 15px; margin-bottom: 4px; }
  .empty-state small { font-size: 12px; }

  /* Assign badge */
  .assign-badge {
    display: inline-block;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .assign-badge.me { background: var(--accent-dim); border-color: var(--accent); color: #a5b4fc; }
  .assign-badge.all { background: var(--surface2); border-color: var(--border); color: var(--muted); }

  /* Private checkbox row */
  .private-row {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .private-row.show { display: flex; }
  .private-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

  /* Export section */
  .export-bar { margin-top: 32px; display: flex; gap: 8px; align-items: center; }
  .export-bar span { color: var(--muted); font-size: 13px; }

  /* ── Briefing view ─────────────────────────────────────────────── */
  .briefing-view { display: none; }

  .briefing-bucket {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .briefing-bucket-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .briefing-bucket-header .count {
    background: var(--surface2);
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 700;
  }
  .bucket-overdue .briefing-bucket-header { color: var(--high); border-bottom-color: var(--high-dim); }
  .bucket-today   .briefing-bucket-header { color: var(--med);  border-bottom-color: var(--med-dim); }
  .bucket-general .briefing-bucket-header { color: var(--accent); }

  .briefing-task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .briefing-task-row:last-child { border-bottom: none; }
  .briefing-task-row:hover { background: var(--surface2); }
  .briefing-task-desc { flex: 1; }
  .briefing-empty { padding: 16px; color: var(--muted); font-size: 13px; text-align: center; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--low); color: var(--low); }
  #toast.error   { border-color: var(--high); color: var(--high); }
</style>
</head>
<body>

<header>
  <div class="logo">Morning<span>Focus</span></div>
  <div class="header-actions">
    <!-- View tabs (task 2.1) -->
    <div class="view-tabs">
      <button class="view-tab active" id="tabTasks"    onclick="showView('tasks')">Tasks</button>
      <button class="view-tab"        id="tabBriefing" onclick="showView('briefing')">Briefing</button>
    </div>
    <button class="btn-ghost" onclick="refreshAll()">↻ Refresh</button>
    <button class="btn-ghost" onclick="logout()">Sign out</button>
  </div>
</header>

<main>

  <!-- Briefing chips (always visible) -->
  <div class="brief-bar" id="briefBar">
    <div class="brief-chip">Loading briefing…</div>
  </div>

  <!-- ── Tasks view (task 2.2) ─────────────────────────────────── -->
  <div id="viewTasks">

    <!-- Add task form -->
    <div class="add-form">
      <h2>Add Task</h2>
      <div class="parse-preview" id="parsePreview">Type a task below. You can use tags: /p:High  /d:tomorrow</div>
      <div class="input-row">
        <input type="text" class="main-input" id="taskInput"
               placeholder='e.g. "Fix login bug /p:High /d:tomorrow"'
               autocomplete="off"
               oninput="onTaskInput()"
               onkeydown="if(event.key==='Enter') addTask()">
        <select class="priority-sel" id="prioritySel">
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Low">Low</option>
        </select>
        <input type="date" class="due-input" id="dueInput">
        <select class="priority-sel" id="assignSel" onchange="onAssignChange()">
          <option value="all">Everyone</option>
        </select>
        <button class="btn-primary" onclick="addTask()">+ Add</button>
      </div>
      <div class="private-row" id="privateRow">
        <input type="checkbox" id="privateCheck">
        <label for="privateCheck" style="text-transform:none;font-size:13px;color:var(--muted);cursor:pointer">Only visible to me</label>
      </div>
      <div class="hint">Tip: Tags in the text override the dropdowns. <code>/p:High</code> sets priority, <code>/d:2026-03-15</code> or <code>/d:tomorrow</code> sets due date.</div>
    </div>

    <!-- Filter bar (task 4.2 — priority chips added) -->
    <div class="filter-bar">
      <button class="tab-btn active" id="tabAll"  onclick="setFilter('all')">All</button>
      <button class="tab-btn"        id="tabOpen" onclick="setFilter('open')">Open only</button>
      <button class="tab-btn"        id="tabDone" onclick="setFilter('done')">Done</button>
      <div class="filter-sep"></div>
      <button class="prio-chip active-all" id="prioAll"    onclick="setPriorityFilter('all')">All</button>
      <button class="prio-chip"            id="prioHigh"   onclick="setPriorityFilter('High')">High</button>
      <button class="prio-chip"            id="prioMedium" onclick="setPriorityFilter('Medium')">Medium</button>
      <button class="prio-chip"            id="prioLow"    onclick="setPriorityFilter('Low')">Low</button>
      <div class="filter-sep"></div>
      <button class="tab-btn active" id="assignAll" onclick="setAssignFilter('all')">All people</button>
      <button class="tab-btn"        id="assignMe"  onclick="setAssignFilter('me')">Mine</button>
    </div>

    <!-- Task list -->
    <table class="task-table" id="taskTable">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>Task</th>
          <th style="width:90px">Priority</th>
          <th style="width:110px">Due</th>
          <th style="width:90px">Assigned</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="taskBody">
        <tr><td colspan="5"><div class="empty-state"><p>Loading…</p></div></td></tr>
      </tbody>
    </table>

    <!-- Export -->
    <div class="export-bar">
      <span>Export:</span>
      <button class="btn-secondary" onclick="exportFile('csv')">⬇ CSV</button>
      <button class="btn-secondary" onclick="exportFile('markdown')">⬇ tasks.md</button>
    </div>

  </div><!-- #viewTasks -->

  <!-- ── Briefing view (task 2.2, 3.1–3.5) ───────────────────── -->
  <div id="viewBriefing" class="briefing-view">
    <div id="briefingContent">
      <div class="empty-state"><p>Loading briefing…</p></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<!-- Supabase JS loaded from CDN (no npm install needed) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ---------------------------------------------------------------------------
// Auth bootstrap — runs before anything else
// ---------------------------------------------------------------------------
let _supabaseClient = null;
let _authToken = null;   // the Bearer token we'll send to the FastAPI backend

async function initAuth() {
  // 1. Ask our own backend for the public Supabase config keys.
  let cfg;
  try {
    cfg = await fetch('/api/config').then(r => r.json());
  } catch (e) {
    // Server is unreachable — nothing we can do.
    return;
  }

  if (!cfg.supabase_url || !cfg.supabase_anon_key) {
    // Auth not configured — allow the app to run without auth (dev/local fallback).
    console.warn('SUPABASE_URL / SUPABASE_ANON_KEY not set. Running without auth.');
    return;
  }

  const { createClient } = supabase;
  _supabaseClient = createClient(cfg.supabase_url, cfg.supabase_anon_key);

  // 2. Check if the user already has a valid session stored in localStorage.
  const { data: { session } } = await _supabaseClient.auth.getSession();

  if (!session) {
    // Not logged in → redirect to the login page.
    window.location.replace('/login');
    return;   // stop the rest of the page from loading
  }

  // 3. Store the access token and user id.
  _authToken = session.access_token;
  currentUserId = session.user.id;

  // 4. Keep the token fresh automatically (Supabase handles token refresh).
  _supabaseClient.auth.onAuthStateChange((_event, newSession) => {
    if (!newSession) {
      // Session expired / user logged out from another tab.
      window.location.replace('/login');
    } else {
      _authToken = newSession.access_token;
    }
  });
}

async function logout() {
  if (_supabaseClient) await _supabaseClient.auth.signOut();
  _authToken = null;
  window.location.replace('/login');
}
</script>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allTasks = [];
let filter = 'all';          // 'all' | 'open' | 'done'
let priorityFilter = 'all';  // 'all' | 'High' | 'Medium' | 'Low'
let assignFilter = 'all';    // 'all' | 'me'
let currentView = 'tasks';   // 'tasks' | 'briefing'
let parseDebounce = null;
let currentUserId = null;    // Supabase UUID of the logged-in user
let allUsers = [];           // [{id, email}] — for the assign dropdown

// ---------------------------------------------------------------------------
// View switching (tasks 2.3, 2.4)
// ---------------------------------------------------------------------------
function showView(name) {
  currentView = name;
  document.getElementById('viewTasks').style.display    = name === 'tasks'    ? '' : 'none';
  document.getElementById('viewBriefing').style.display = name === 'briefing' ? '' : 'none';
  document.getElementById('tabTasks').classList.toggle('active', name === 'tasks');
  document.getElementById('tabBriefing').classList.toggle('active', name === 'briefing');
  if (name === 'briefing') loadBriefing();  // task 2.4: always refresh on switch
}

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------
async function api(method, path, body) {
  const opts = { method, headers: {} };
  // Attach the Supabase Bearer token so FastAPI can verify it.
  if (_authToken) opts.headers['Authorization'] = `Bearer ${_authToken}`;
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (r.status === 401) {
    // Token expired or invalid — send the user back to the login page.
    window.location.replace('/login');
    throw new Error('Not authenticated');
  }
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

// ---------------------------------------------------------------------------
// Briefing chips bar
// ---------------------------------------------------------------------------
function updateBriefingChips(b) {
  const bar = document.getElementById('briefBar');
  const today = new Date(b.date + 'T00:00:00');
  const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  bar.innerHTML = `
    <div class="brief-chip" style="color:var(--muted)">📅 ${fmt(today)}</div>
    <div class="brief-chip overdue">🔴 ${b.overdue.length} overdue</div>
    <div class="brief-chip today">🟡 ${b.today.length} due today</div>
    <div class="brief-chip general">📋 ${b.general.length} general</div>
  `;
}

// ---------------------------------------------------------------------------
// Briefing view (tasks 3.1–3.5)
// ---------------------------------------------------------------------------
async function loadBriefing() {
  try {
    const b = await api('GET', '/api/brief');
    updateBriefingChips(b);
    renderBriefing(b);
  } catch(e) { console.error('brief', e); }
}

function renderBriefing(b) {
  const buckets = [
    { key: 'overdue', cls: 'bucket-overdue', icon: '🔴', label: 'Overdue',   tasks: b.overdue },
    { key: 'today',   cls: 'bucket-today',   icon: '🟡', label: 'Due Today', tasks: b.today },
    { key: 'general', cls: 'bucket-general', icon: '📋', label: 'General',   tasks: b.general },
  ];

  const html = buckets.map(({ cls, icon, label, tasks }) => `
    <div class="briefing-bucket ${cls}">
      <div class="briefing-bucket-header">
        ${icon} ${label} <span class="count">${tasks.length}</span>
      </div>
      ${tasks.length === 0
        ? '<div class="briefing-empty">Nothing here</div>'
        : tasks.map(t => briefingTaskRow(t)).join('')
      }
    </div>
  `).join('');

  document.getElementById('briefingContent').innerHTML = html;
}

function briefingTaskRow(t) {
  const dueTxt = t.due ? `<span class="due-badge">${t.due}</span>` : '';
  return `<div class="briefing-task-row">
    <button class="check-btn ${t.done ? 'checked' : ''}"
            title="${t.done ? 'Reopen' : 'Mark done'}"
            onclick="toggleDoneInBriefing(${t.id}, ${t.done})"></button>
    <span class="briefing-task-desc">${esc(t.description)}</span>
    <span class="prio-badge prio-${t.priority}">${t.priority}</span>
    ${dueTxt}
  </div>`;
}

// task 3.5: toggle done from briefing view and refresh briefing
async function toggleDoneInBriefing(id, isDone) {
  try {
    const path = isDone ? `/api/tasks/${id}/reopen` : `/api/tasks/${id}/done`;
    await api('PATCH', path);
    await loadBriefing();
    await loadTasks();  // keep chips in sync
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ---------------------------------------------------------------------------
// Task list
// ---------------------------------------------------------------------------
async function loadTasks() {
  try {
    allTasks = await api('GET', '/api/tasks?include_done=true');
    renderTasks();
  } catch(e) {
    showToast('Failed to load tasks: ' + e.message, 'error');
  }
}

// task 4.5: apply both status filter and priority filter
function renderTasks() {
  const tbody = document.getElementById('taskBody');
  const today = new Date(); today.setHours(0,0,0,0);

  let visible = allTasks;
  if (filter === 'open') visible = visible.filter(t => !t.done);
  if (filter === 'done') visible = visible.filter(t => t.done);
  if (priorityFilter !== 'all') visible = visible.filter(t => t.priority === priorityFilter);
  // "Mine" filter: only show tasks assigned to me or to everyone
  if (assignFilter === 'me') visible = visible.filter(t => t.assigned_to === currentUserId || t.assigned_to === 'all');

  if (!visible.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <p>No tasks here.</p>
      <small>${filter === 'all' && priorityFilter === 'all' ? 'Add one above.' : 'Try a different filter.'}</small>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = visible.map(t => {
    const dueBadge = dueBadgeHtml(t.due, today);
    const checked = t.done ? 'checked' : '';
    const doneClass = t.done ? 'is-done' : '';
    const assignLabel = assignBadgeHtml(t.assigned_to, t.private);
    return `<tr class="task-row ${doneClass}" data-id="${t.id}">
      <td><button class="check-btn ${checked}" title="${t.done ? 'Reopen' : 'Mark done'}"
           onclick="toggleDone(${t.id}, ${t.done})"></button></td>
      <td class="task-desc">${esc(t.description)}</td>
      <td><span class="prio-badge prio-${t.priority}">${t.priority}</span></td>
      <td class="due-cell" onclick="editDue(${t.id}, ${JSON.stringify(t.due || '')})"
          title="Click to edit due date">${dueBadge}</td>
      <td>${assignLabel}</td>
      <td><button class="btn-danger" onclick="deleteTask(${t.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function dueBadgeHtml(due, today) {
  if (!due) return '<span class="due-badge">—</span>';
  const d = new Date(due + 'T00:00:00');
  const diff = Math.floor((d - today) / 86400000);
  let cls = 'due-badge';
  let label = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  if (diff < 0)      { cls += ' due-overdue'; label += ' ⚠'; }
  else if (diff === 0) { cls += ' due-today'; label = 'Today'; }
  return `<span class="${cls}">${label}</span>`;
}

function assignBadgeHtml(assigned_to, isPrivate) {
  if (assigned_to === 'all') return `<span class="assign-badge all">Everyone</span>`;
  if (assigned_to === currentUserId) {
    const label = isPrivate ? '🔒 Me' : 'Me';
    return `<span class="assign-badge me">${label}</span>`;
  }
  // Another user — look up their email
  const user = allUsers.find(u => u.id === assigned_to);
  const label = user ? user.email.split('@')[0] : 'Other';
  return `<span class="assign-badge">${esc(label)}</span>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---------------------------------------------------------------------------
// Status filter tabs
// ---------------------------------------------------------------------------
function setFilter(f) {
  filter = f;
  ['All','Open','Done'].forEach(n => {
    const el = document.getElementById('tab' + n);
    el.classList.toggle('active', n.toLowerCase() === f || (f === 'all' && n === 'All'));
  });
  renderTasks();
}

// ---------------------------------------------------------------------------
// Priority filter (tasks 4.4, 4.5)
// ---------------------------------------------------------------------------
function setPriorityFilter(p) {
  priorityFilter = p;
  ['all','High','Medium','Low'].forEach(v => {
    const el = document.getElementById('prio' + (v === 'all' ? 'All' : v));
    const isActive = v === p;
    el.className = 'prio-chip' + (isActive ? ' active-' + p : '');
  });
  renderTasks();
}

// ---------------------------------------------------------------------------
// Add task
// ---------------------------------------------------------------------------
function onTaskInput() {
  clearTimeout(parseDebounce);
  const raw = document.getElementById('taskInput').value.trim();
  if (!raw) {
    setPreview('Type a task below. You can use tags: /p:High  /d:tomorrow', '');
    return;
  }
  parseDebounce = setTimeout(() => liveParsePreview(raw), 300);
}

async function liveParsePreview(raw) {
  try {
    const r = await api('POST', '/api/tasks/parse', { text: raw });
    document.getElementById('prioritySel').value = r.priority;
    if (r.due) document.getElementById('dueInput').value = r.due;
    setPreview(`✓ "${esc(r.description)}"  priority: ${r.priority}${r.due ? '  due: ' + r.due : ''}`, 'ready');
  } catch(e) {
    setPreview('⚠ ' + e.message, 'error');
  }
}

function setPreview(msg, cls) {
  const el = document.getElementById('parsePreview');
  el.innerHTML = msg;
  el.className = 'parse-preview ' + cls;
}

async function addTask() {
  const raw = document.getElementById('taskInput').value.trim();
  if (!raw) { showToast('Please enter a task description.', 'error'); return; }

  let description = raw, priority = document.getElementById('prioritySel').value;
  let due = document.getElementById('dueInput').value || null;

  try {
    const parsed = await api('POST', '/api/tasks/parse', { text: raw });
    description = parsed.description;
    priority = parsed.priority;
    if (parsed.due) due = parsed.due;
  } catch(e) { /* use raw */ }

  const assigned_to = document.getElementById('assignSel').value;
  const private_task = assigned_to === currentUserId && document.getElementById('privateCheck').checked;

  try {
    await api('POST', '/api/tasks', { description, priority, due: due || null, assigned_to, private: private_task });
    document.getElementById('taskInput').value = '';
    document.getElementById('dueInput').value = '';
    document.getElementById('prioritySel').value = 'Medium';
    document.getElementById('assignSel').value = 'all';
    document.getElementById('privateCheck').checked = false;
    document.getElementById('privateRow').classList.remove('show');
    setPreview('Type a task below. You can use tags: /p:High  /d:tomorrow', '');
    await refreshAll();
    showToast('Task added!', 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// Show/hide the "Only visible to me" checkbox
function onAssignChange() {
  const val = document.getElementById('assignSel').value;
  document.getElementById('privateRow').classList.toggle('show', val === currentUserId);
  if (val !== currentUserId) document.getElementById('privateCheck').checked = false;
}

// Assign filter (All people / Mine)
function setAssignFilter(f) {
  assignFilter = f;
  document.getElementById('assignAll').classList.toggle('active', f === 'all');
  document.getElementById('assignMe').classList.toggle('active', f === 'me');
  renderTasks();
}

// ---------------------------------------------------------------------------
// Toggle done / delete
// ---------------------------------------------------------------------------
async function toggleDone(id, isDone) {
  try {
    const path = isDone ? `/api/tasks/${id}/reopen` : `/api/tasks/${id}/done`;
    await api('PATCH', path);
    await refreshAll();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await api('DELETE', `/api/tasks/${id}`);
    await refreshAll();
    showToast('Task deleted.', 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ---------------------------------------------------------------------------
// Inline due date edit (tasks 5.1–5.5)
// ---------------------------------------------------------------------------
function editDue(id, currentDue) {
  // Find the cell that triggered this
  const row = document.querySelector(`.task-row[data-id="${id}"]`);
  if (!row) return;
  const cell = row.querySelector('.due-cell');
  const originalHtml = cell.innerHTML;

  const input = document.createElement('input');
  input.type = 'date';
  input.className = 'due-edit-input';
  input.value = currentDue || '';
  cell.innerHTML = '';
  cell.appendChild(input);
  input.focus();

  let saved = false;

  async function save() {
    if (saved) return;
    saved = true;
    const newDue = input.value || null;
    try {
      await api('PATCH', `/api/tasks/${id}`, { due: newDue });
      await refreshAll();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
      cell.innerHTML = originalHtml;
    }
  }

  function cancel() {
    if (saved) return;
    saved = true;
    cell.innerHTML = originalHtml;
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { saved = true; cell.innerHTML = originalHtml; }
  });
}

// ---------------------------------------------------------------------------
// Export
// ---------------------------------------------------------------------------
function exportFile(fmt) {
  window.location.href = `/api/export/${fmt}`;
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
async function refreshAll() {
  if (currentView === 'briefing') {
    await Promise.all([loadTasks(), loadBriefing()]);
  } else {
    const b = api('GET', '/api/brief').then(updateBriefingChips).catch(() => {});
    await Promise.all([loadTasks(), b]);
  }
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ---------------------------------------------------------------------------
// Init — auth first, then load data
// ---------------------------------------------------------------------------
initAuth().then(async () => {
  if (_authToken === null && window._supabaseClient) return; // redirecting to login

  // Register current user in the profiles table + fetch all users for dropdown
  try {
    await api('GET', '/api/me');
    allUsers = await api('GET', '/api/users');
    buildAssignDropdown();
  } catch(e) { console.warn('Could not load users', e); }

  refreshAll();
});

function buildAssignDropdown() {
  const sel = document.getElementById('assignSel');
  sel.innerHTML = '<option value="all">Everyone</option>';
  allUsers.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.id === currentUserId ? 'Me (' + u.email + ')' : u.email.split('@')[0];
    sel.appendChild(opt);
  });
}
</script>
