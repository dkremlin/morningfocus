<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MorningFocus — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --muted: #8892b0;
    --accent: #6366f1;
    --high: #ef4444;
    --high-dim: #450a0a;
    --low: #22c55e;
    --low-dim: #052e16;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 380px;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    text-align: center;
  }
  .logo span { color: var(--accent); }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* Forms */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  input[type="email"]:focus,
  input[type="password"]:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    transition: opacity 0.15s;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .msg {
    border-radius: 6px;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 14px;
    display: none;
  }
  .msg.show { display: block; }
  .msg.error   { background: var(--high-dim); border: 1px solid var(--high); color: var(--high); }
  .msg.success { background: var(--low-dim);  border: 1px solid var(--low);  color: var(--low); text-align: center; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Morning<span>Focus</span></div>

  <!-- Tab switcher -->
  <div class="tabs">
    <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
    <button class="tab"        id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Sign In form -->
  <div class="form-panel active" id="panelSignIn">
    <form onsubmit="handleSignIn(event)">
      <label for="siEmail">Email</label>
      <input type="email" id="siEmail" placeholder="you@example.com" required autocomplete="email">

      <label for="siPassword">Password</label>
      <input type="password" id="siPassword" placeholder="••••••••" required autocomplete="current-password">

      <button type="submit" class="btn-primary" id="siBtn">Sign In</button>
    </form>
    <div class="msg" id="siMsg"></div>
  </div>

  <!-- Sign Up form -->
  <div class="form-panel" id="panelSignUp">
    <form onsubmit="handleSignUp(event)">
      <label for="suEmail">Email</label>
      <input type="email" id="suEmail" placeholder="you@example.com" required autocomplete="email">

      <label for="suPassword">Password</label>
      <input type="password" id="suPassword" placeholder="At least 6 characters" required autocomplete="new-password">

      <label for="suConfirm">Confirm Password</label>
      <input type="password" id="suConfirm" placeholder="••••••••" required autocomplete="new-password">

      <button type="submit" class="btn-primary" id="suBtn">Create Account</button>
    </form>
    <div class="msg" id="suMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  let _client = null;

  // ── Tab switching ──────────────────────────────────────────────
  function switchTab(tab) {
    const isSignIn = tab === 'signin';
    document.getElementById('tabSignIn').classList.toggle('active', isSignIn);
    document.getElementById('tabSignUp').classList.toggle('active', !isSignIn);
    document.getElementById('panelSignIn').classList.toggle('active', isSignIn);
    document.getElementById('panelSignUp').classList.toggle('active', !isSignIn);
  }

  // ── Helpers ────────────────────────────────────────────────────
  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg show ' + type;
  }
  function clearMsg(id) { document.getElementById(id).className = 'msg'; }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : label;
  }

  // ── Init ───────────────────────────────────────────────────────
  async function init() {
    let cfg;
    try {
      cfg = await fetch('/api/config').then(r => r.json());
    } catch (e) {
      setMsg('siMsg', 'Cannot reach the server. Is it running?', 'error');
      return;
    }

    if (!cfg.supabase_url || !cfg.supabase_anon_key) {
      // No Supabase configured — running in local mode, skip login entirely.
      window.location.replace('/');
      return;
    }

    _client = supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);

    // Already logged in? Skip straight to the app.
    const { data: { session } } = await _client.auth.getSession();
    if (session) window.location.replace('/');
  }

  // ── Sign In ────────────────────────────────────────────────────
  async function handleSignIn(e) {
    e.preventDefault();
    clearMsg('siMsg');
    setLoading('siBtn', true, 'Sign In');

    const email    = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;

    const { error } = await _client.auth.signInWithPassword({ email, password });

    if (error) {
      setMsg('siMsg', error.message, 'error');
      setLoading('siBtn', false, 'Sign In');
      return;
    }

    setMsg('siMsg', 'Signed in! Redirecting…', 'success');
    setTimeout(() => window.location.replace('/'), 700);
  }

  // ── Sign Up ────────────────────────────────────────────────────
  async function handleSignUp(e) {
    e.preventDefault();
    clearMsg('suMsg');

    const email    = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;
    const confirm  = document.getElementById('suConfirm').value;

    if (password !== confirm) {
      setMsg('suMsg', 'Passwords do not match.', 'error');
      return;
    }
    if (password.length < 6) {
      setMsg('suMsg', 'Password must be at least 6 characters.', 'error');
      return;
    }

    setLoading('suBtn', true, 'Create Account');

    const { error } = await _client.auth.signUp({ email, password });

    if (error) {
      setMsg('suMsg', error.message, 'error');
      setLoading('suBtn', false, 'Create Account');
      return;
    }

    // Success — Supabase either logs them in directly (if email confirm is OFF)
    // or sends a confirmation email (if it is ON).
    setMsg('suMsg', 'Account created! Signing you in…', 'success');
    setTimeout(async () => {
      // Try to sign in immediately (works when email confirmation is disabled).
      const { error: loginErr } = await _client.auth.signInWithPassword({ email, password });
      if (loginErr) {
        setMsg('suMsg', 'Account created! Check your email to confirm, then sign in.', 'success');
        setLoading('suBtn', false, 'Create Account');
      } else {
        window.location.replace('/');
      }
    }, 800);
  }

  init();
</script>
</body>
</html>
